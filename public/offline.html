<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline · IluEats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #e64e0e;
      --color-primary-soft: #fdeee5;
      --color-bg: #fcfaf7;
      --color-surface: #ffffff;
      --color-ink: #231512;
      --color-ink-muted: #6f625c;
      --color-line: #ede7e0;
    }
    
    body {
      margin: 0;
      padding: 0;
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      background-color: var(--color-bg);
      color: var(--color-ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      box-sizing: border-box;
      padding: 24px;
      text-align: center;
    }

    .card {
      background: var(--color-surface);
      border: 1px solid var(--color-line);
      border-radius: 24px;
      padding: 40px 24px;
      max-width: 380px;
      width: 100%;
      box-shadow: 0 1px 2px rgba(35, 21, 18, 0.04), 0 8px 24px -4px rgba(35, 21, 18, 0.06);
    }

    .icon-container {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: var(--color-primary-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .icon-container svg {
      width: 40px;
      height: 40px;
      stroke: var(--color-primary);
    }

    h1 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 24px;
      font-weight: 800;
      margin: 0 0 12px;
      color: var(--color-ink);
      letter-spacing: -0.02em;
    }

    p {
      font-size: 14px;
      line-height: 1.6;
      color: var(--color-ink-muted);
      margin: 0 0 32px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: var(--color-primary);
      color: white;
      font-weight: 600;
      font-size: 14px;
      border: none;
      border-radius: 14px;
      padding: 14px 28px;
      cursor: pointer;
      width: 100%;
      box-sizing: border-box;
      transition: transform 0.2s ease, opacity 0.2s ease;
      box-shadow: 0 4px 12px rgba(230, 78, 14, 0.15);
    }

    .btn:active {
      transform: scale(0.98);
      opacity: 0.95;
    }

    .btn-secondary {
      background-color: transparent;
      border: 1px solid var(--color-line);
      color: var(--color-ink-muted);
      box-shadow: none;
      margin-top: 12px;
    }

    .btn-secondary:active {
      background-color: var(--color-bg);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-container">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.284 16.284A3 3 0 0 0 12 17h.008a3 3 0 0 0 2.292-1.077M15.75 9h.008v.008H15.75V9Zm-3.75 0h.008v.008H12V9Zm-3.75 0h.008v.008H8.25V9Zm11.025 8.243c.123.633-.356 1.196-.984 1.196H5.709c-.628 0-1.107-.563-.984-1.196A9 9 0 0 1 12 3a9 9 0 0 1 8.225 14.243Z" />
      </svg>
    </div>
    <h1>Connection Lost</h1>
    <p>You are currently offline. Check your network settings and try reloading the page to order your delicious meals.</p>
    <button class="btn" onclick="window.location.reload()">Try Again</button>
    <button class="btn btn-secondary" onclick="window.history.back()">Go Back</button>
  </div>
</body>
</html>
